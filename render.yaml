services:
  # ─────────────────────────────────────────────────────────────
  # Backend Node (existente)
  # ─────────────────────────────────────────────────────────────
  - type: web
    name: laura-saas-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000

      # MongoDB
      - key: MONGODB_URI
        sync: false

      # JWT
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false

      # OpenAI
      - key: OPENAI_API_KEY
        sync: false

      # Evolution API (WhatsApp)
      - key: EVOLUTION_API_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: EVOLUTION_INSTANCE
        sync: false
      - key: EVOLUTION_WEBHOOK_SECRET
        sync: false

      # Web Push VAPID
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false

      # SMTP
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

      # Frontend URL
      - key: FRONTEND_URL
        sync: false

      # ── ia-service (Phase 2) ──
      - key: IA_SERVICE_URL
        fromService:
          name: marcai-ia-service
          type: web
          property: hostport
      - key: IA_SERVICE_ENABLED
        value: "true"
      - key: INTERNAL_SERVICE_TOKEN
        sync: false

  # ─────────────────────────────────────────────────────────────
  # ia-service Python (Phase 2 — novo)
  # ─────────────────────────────────────────────────────────────
  - type: web
    name: marcai-ia-service
    env: docker
    region: oregon
    plan: free
    rootDir: ia-service
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: IA_SERVICE_PORT
        value: 8000

      # Internal communication com o Node
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: MARCAI_API_URL
        fromService:
          name: laura-saas-backend
          type: web
          property: hostport

      # MongoDB (mesmo cluster que o Node — DB-per-tenant via tenant_<id>)
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_PREFIX
        value: ""

      # Evolution API
      - key: EVOLUTION_API_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false

      # OpenAI (Phase 4+)
      - key: OPENAI_API_KEY
        sync: false

      # Sentry (opcional)
      - key: SENTRY_DSN
        sync: false
