# Marcai — reverse proxy nginx (ADR-023)
#
# Substituir API_DOMAIN e WA_DOMAIN pelos domínios reais antes de subir.
# Ex.: api.marcai.pt  e  wa.marcai.pt
#
# ia-service e redis NÃO têm server block — são internos à rede Docker.

# ---------- HTTP: ACME challenge + redirect para HTTPS ----------
server {
    listen 80;
    listen [::]:80;
    server_name API_DOMAIN WA_DOMAIN LOGS_DOMAIN;

    # Validação Let's Encrypt (webroot partilhado com o certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS: API (backend Node/Express) ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name API_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/API_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/API_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Webhook do Evolution pode trazer payloads maiores; API normal é pequena
    client_max_body_size 2m;

    location / {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

# ---------- HTTPS: painel/QR Evolution API ----------
# Necessário para ler o QR code e gerir instâncias (protegido pela API key do Evolution).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name WA_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/API_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/API_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 20m;

    location / {
        proxy_pass http://evolution-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket (eventos em tempo real do Evolution)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
    }
}
