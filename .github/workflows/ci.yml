name: CI

on:
  push:
    branches: [main, melhorias_sistema, Colcando_skills]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: NODE_ENV=test NODE_OPTIONS='--experimental-vm-modules' npx jest --forceExit --coverage --coverageThreshold='{"global":{"lines":25}}'
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-ci
          JWT_REFRESH_SECRET: test-refresh-secret-ci
          MONGO_URI: mongodb://localhost:27017/test

  frontend:
    name: Frontend build & lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: laura-saas-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: laura-saas-frontend

      - name: Lint
        run: npm run lint
        working-directory: laura-saas-frontend

      - name: Build (TypeScript check + Vite)
        run: npm run build
        working-directory: laura-saas-frontend
        env:
          VITE_API_URL: https://placeholder.render.com
