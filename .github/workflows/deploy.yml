name: Deploy (Contabo)

# Auto-deploy do backend + ia-service para o VPS Contabo a cada merge em main.
# SEGURANÇA: sincroniza apenas o código da app (src/, ia-service/src/ e ficheiros
# de build). NUNCA toca em `.env` (segredos) nem em `nginx/` (configs com os
# domínios reais já substituídos no servidor). O frontend continua na Vercel.
#
# Pré-requisitos (uma vez) — Settings → Secrets and variables → Actions:
#   CONTABO_HOST    -> 80.241.222.235
#   CONTABO_USER    -> root
#   CONTABO_SSH_KEY -> chave PRIVADA cuja pública está em ~/.ssh/authorized_keys do servidor

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'ia-service/**'
      - 'Dockerfile'
      - 'docker-compose.prod.yml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch: {}   # permite disparar à mão no separador Actions

concurrency:
  group: deploy-contabo
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.CONTABO_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.CONTABO_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # Sincroniza + reconstrói tudo via SSH usando git clone NO SERVIDOR
      # (o servidor tem git + docker; NÃO precisa de rsync). Copia só o código
      # da app — nunca toca em .env nem nginx/. Depois reconstrói com o GIT_SHA.
      - name: Deploy (git clone + rebuild no servidor)
        run: |
          SHA="${GITHUB_SHA::7}"
          NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes \
            "${{ secrets.CONTABO_USER }}@${{ secrets.CONTABO_HOST }}" \
            "set -e; \
             rm -rf /tmp/md; \
             git clone --depth 1 https://github.com/andredosreis/laura-saas-agenda.git /tmp/md; \
             cp -rf /tmp/md/src/. /opt/marcai/src/; \
             cp -rf /tmp/md/ia-service/src/. /opt/marcai/ia-service/src/; \
             cp -f /tmp/md/Dockerfile /tmp/md/docker-compose.prod.yml /tmp/md/package.json /tmp/md/package-lock.json /opt/marcai/; \
             cp -f /tmp/md/ia-service/Dockerfile /tmp/md/ia-service/pyproject.toml /opt/marcai/ia-service/; \
             rm -rf /tmp/md; \
             cd /opt/marcai; \
             GIT_SHA=$SHA BUILT_AT=$NOW docker compose -f docker-compose.prod.yml up -d --build backend ia-service"

      - name: Confirmar versão deployada
        run: |
          echo "Commit deployado: ${GITHUB_SHA::7}"
          echo "Verifica em: https://api.<o-teu-dominio>/api/version"
