services:
  evolution-api:
    image: atendai/evolution-api:v1.8.7
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - LOG_LEVEL=VERBOSE
      - LOG_COLOR=true
      - LOG_BAILEYS=debug
      - DEL_INSTANCE=false
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP=true
      - STORE_CONTACTS=true
      - STORE_CHATS=true
    volumes:
      - evolution_data:/evolution/instances
      - evolution_store:/evolution/store

  backend:
    build: .
    container_name: marcai-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - IA_SERVICE_URL=http://ia-service:8000
      - IA_SERVICE_ENABLED=${IA_SERVICE_ENABLED:-true}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-dev-token-only}
    depends_on:
      - evolution-api

  ia-service:
    build: ./ia-service
    container_name: marcai-ia-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-dev-token-only}
      - MARCAI_API_URL=http://backend:5000
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DB_PREFIX=${MONGODB_DB_PREFIX:-marcai}
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SENTRY_DSN=${SENTRY_DSN_IA:-}
    depends_on:
      - backend

volumes:
  evolution_data:
  evolution_store:
