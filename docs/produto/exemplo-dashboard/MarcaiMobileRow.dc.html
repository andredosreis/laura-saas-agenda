<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div onClick="{{ r.open }}" style="background:#ffffff;border:1px solid #e8e2da;border-radius:3px;padding:12px 13px;cursor:pointer;font-family:'Hanken Grotesk',system-ui,sans-serif">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
    <div style="display:flex;align-items:center;gap:9px;min-width:0">
      <div style="width:30px;height:30px;border-radius:50%;background:#f0ddcf;color:#a14d27;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;flex:none">{{ r.initials }}</div>
      <div style="min-width:0">
        <div style="font-size:13.5px;font-weight:600;color:#221f1d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ r.name }}</div>
        <div style="font-size:11.5px;color:#8a827a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ r.owner }}</div>
      </div>
    </div>
    <span style="display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;border-radius:2px;font-size:11.5px;font-weight:600;background:{{ r.statusBg }};color:{{ r.statusColor }};flex:none"><span style="width:6px;height:6px;border-radius:1px;background:{{ r.statusColor }}"></span>{{ r.statusLabel }}</span>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:11px;padding-top:10px;border-top:1px solid #f1ece4">
    <div style="display:flex;gap:14px">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#534c45"><span style="color:#9a938c">L</span> {{ r.leads }}</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#534c45"><span style="color:#9a938c">A</span> {{ r.bookings }}</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#a14d27;font-weight:600">IA {{ r.aiCostStr }}</span>
    </div>
    <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:{{ r.renewalColor }}">{{ r.renewalShort }}</span>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:300,&quot;height&quot;:96},&quot;r&quot;:{&quot;editor&quot;:null,&quot;default&quot;:null},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#bd5d33&quot;}}"></script>
</body>
</html>
