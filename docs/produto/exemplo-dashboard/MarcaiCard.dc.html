<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div onClick="{{ r.open }}" style-hover="border-color:#cabfb2" style="background:#ffffff;border:1px solid #e8e2da;border-left:3px solid {{ accent }};border-radius:3px;padding:13px 14px;cursor:pointer;transition:border-color .12s;font-family:'Hanken Grotesk',system-ui,sans-serif">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
    <div style="display:flex;align-items:center;gap:9px;min-width:0">
      <div style="width:28px;height:28px;border-radius:50%;background:#f0ddcf;color:#a14d27;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;flex:none">{{ r.initials }}</div>
      <span style="font-size:13.5px;font-weight:600;color:#221f1d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ r.name }}</span>
    </div>
    <span style="display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:2px;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;background:{{ r.planBg }};color:{{ r.planColor }};flex:none">{{ r.plan }}</span>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px">
    <div style="display:flex;gap:16px">
      <div><div style="font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:#9a938c">Leads</div><div style="font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:#221f1d;margin-top:2px">{{ r.leads }}</div></div>
      <div><div style="font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:#9a938c">Agend.</div><div style="font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:#221f1d;margin-top:2px">{{ r.bookings }}</div></div>
    </div>
    <div style="text-align:right"><div style="font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:#a14d27">Custo IA</div><div style="font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:#a14d27;margin-top:2px">{{ r.aiCostStr }}</div></div>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:11px;border-top:1px solid #f1ece4">
    <span style="display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;border-radius:2px;font-size:12px;font-weight:600;background:{{ r.statusBg }};color:{{ r.statusColor }}"><span style="width:7px;height:7px;border-radius:1px;background:{{ r.statusColor }}"></span>{{ r.statusLabel }}</span>
    <span style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:{{ r.renewalColor }}">{{ r.renewalShort }}</span>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:320,&quot;height&quot;:118},&quot;r&quot;:{&quot;editor&quot;:null,&quot;default&quot;:null},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#b23a2c&quot;}}"></script>
</body>
</html>
